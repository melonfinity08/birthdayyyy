<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <title>BBG'S BIRTHDAYYY <3</title>

<style>
    body {
        font-family: 'Poppins', sans-serif;
        text-align: center;
     background: linear-gradient(to right, #a1c4fd, #c2e9fb);
        padding-top: 100px;
        overflow: hidden;
     color: #1e3a8a;
    }

    h1 {
        font-size: 60px;
        letter-spacing: 3px;
       text-shadow: 0 0 15px rgba(102,126,234,0.5);
        animation: pop 1s ease;
    }

    h2 {
        font-size: 28px;
        opacity: 0.9;
        margin-bottom: 20px;
    }

    p {
        font-size: 20px;
        margin: 10px 0;
        line-height: 1.6;
        animation: fadeIn 2s ease;
    }
#mainContent {
    padding: 20px;
    border-radius: 20px;
    display: none;
};
}
}
    }

    #countdown {
        display: none;
        font-size: 90px;
        font-weight: bold;
    }

    input {
        padding: 12px;
        border-radius: 20px;
        border: none;
        outline: none;
    }

    button {
        padding: 12px 25px;
    background: #3b82f6;
        color: white;
        border: none;
        border-radius: 20px;
        margin-top: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
  background: #2563eb;
        transform: scale(1.05);
    }

    @keyframes pop {
        0% { transform: scale(0.5); }
        100% { transform: scale(1); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<!-- 🎉 Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function blastConfetti() {
    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });
}
</script>


<!-- 🔐 PASSWORD SCREEN -->
<div id="login">
    <h2>Enter the passcode 👀</h2>
    <input type="password" id="password">
    <br>
    <button onclick="checkPassword()">Unlock 💌</button>
</div>

<!-- ⏳ COUNTDOWN -->
<div id="countdown"></div>

<!-- 🎉 MAIN CONTENT -->
<div id="mainContent">
    <h1 style="font-size:50px; animation: pop 1s ease;">🎉 HAPPY BIRTHDAY CUTIEEE!! 🎉</h1>

    <p>You’re one of the best people I met 💕</p>
    <p>I’m really glad you exist ✨</p>
    <p>Hope this year brings you everything you deserve 🌸</p
    <p>And also thanks for being Juliana to by Clive Bixby 😘</p                                              
</div>

<script>
function checkPassword() {
    var password = document.getElementById("password").value;

    if (password === "Juliana") {  // 👉 CHANGE THIS
        document.getElementById("login").style.display = "none";
        startCountdown();
    } else {
        alert("nahhh that's not it 👀 try again cutu");
    }
}

function startCountdown() {
    var count = 3;
    var countdownEl = document.getElementById("countdown");
    countdownEl.style.display = "block";

    var interval = setInterval(function() {
        countdownEl.innerHTML = count;
        count--;

        if (count < 0) {
            clearInterval(interval);
            countdownEl.style.display = "none";
            showMain();
        }
    }, 1000);
}

function showMain() {
    document.getElementById("mainContent").style.display = "block";
    blastConfetti();
}
</script>

</body>
</html>
